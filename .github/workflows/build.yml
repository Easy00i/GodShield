name: Build GodShield

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build with Maven
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 21 (required by Paper 1.21.1) ─────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ── 3. Build (skip tests — Paper plugins use server API) ──
      - name: Build with Maven
        run: mvn clean package -B -DskipTests

      # ── 4. Upload the final JAR as a downloadable artifact ────
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: GodShield-${{ github.sha }}
          path: target/GodShield.jar
          retention-days: 30

      # ── 5. Print success message ──────────────────────────────
      - name: Build complete
        run: echo "GodShield.jar built successfully!"
